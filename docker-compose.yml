services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vkstorm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vkstorm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkstorm"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_VK_APP_ID: ${VK_APP_ID}
        NEXT_PUBLIC_VK_REDIRECT_URI: ${VK_REDIRECT_URI}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://vkstorm:${POSTGRES_PASSWORD}@postgres:5432/vkstorm
      VK_APP_ID: ${VK_APP_ID}
      VK_APP_SECRET: ${VK_APP_SECRET}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI}
      NEXT_PUBLIC_VK_APP_ID: ${VK_APP_ID}
      NEXT_PUBLIC_VK_REDIRECT_URI: ${VK_REDIRECT_URI}
      UPLOADS_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    # Host nginx (the VPS already runs one for other projects) terminates TLS
    # and reverse-proxies to this port. Bind to loopback so the app is not
    # exposed on the public interface.
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  uploads_data:
