services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vkstorm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vkstorm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkstorm"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_VK_APP_ID: ${VK_APP_ID}
        NEXT_PUBLIC_VK_REDIRECT_URI: ${VK_REDIRECT_URI}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://vkstorm:${POSTGRES_PASSWORD}@postgres:5432/vkstorm
      VK_APP_ID: ${VK_APP_ID}
      VK_APP_SECRET: ${VK_APP_SECRET}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI}
      NEXT_PUBLIC_VK_APP_ID: ${VK_APP_ID}
      NEXT_PUBLIC_VK_REDIRECT_URI: ${VK_REDIRECT_URI}
      UPLOADS_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
